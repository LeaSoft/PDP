name: 🚀 PDP | Deployment & Security

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deployment-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: 🐳 Images | Build & push (${{ matrix.id }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - id: php
            target: prod
            image: leasoft/pdp-php
            cache_scope: pdp-php
          - id: nginx
            target: nginx
            image: leasoft/pdp-nginx
            cache_scope: pdp-nginx

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Repo | Checkout
        uses: actions/checkout@v5

      - name: ⚙️ Docker | Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Registry | Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧱 Image | Build & push (${{ matrix.id }}) (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64
          provenance: false
          tags: |
            ${{ env.REGISTRY }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha,scope=${{ matrix.cache_scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache_scope }}

  trivy-scan:
    name: 🔍 Security | Trivy scan & upload SARIF
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false
      matrix:
        include:
          - id: php
            image: leasoft/pdp-php
          - id: nginx
            image: leasoft/pdp-nginx

    permissions:
      contents: read
      packages: read
      actions: read
      security-events: write

    steps:
      - name: 🔐 Registry | Log in to GHCR (read)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧪 Security | Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          format: sarif
          output: trivy-${{ matrix.id }}.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true

      - name: 📎 Security | Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.id }}.sarif

  deploy:
    name: 🚢 Prod | Deploy to server
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: 🔐 SSH | Deploy to PROD
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -euo pipefail

            echo "📂 Repo | Switch to project directory..."
            cd /pdp/PDP

            echo "🔄 Repo | Update from origin/main..."
            git fetch origin main
            git reset --hard origin/main

            echo "🔐 Registry | Log in to GHCR..."
            echo "${{ secrets.CR_PAT }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.GHCR_USER }} --password-stdin

            echo "🏷️ Image | Using tag from build..."
            export IMAGE_TAG="${{ github.sha }}"

            echo "📥 Compose | Pull latest images..."
            docker compose -f docker-compose.prod.yaml pull

            echo "🚀 Compose | Restart services..."
            docker compose -f docker-compose.prod.yaml up -d

            echo "🧹 Docker | Prune old images..."
            docker image prune -f

            echo "✅ Prod | Deployment finished"

  cleanup:
    name: 🧹 Registry | Cleanup GHCR (keep last 10)
    runs-on: ubuntu-latest
    needs: build

    env:
      GH_TOKEN: ${{ github.token }}

    strategy:
      matrix:
        package: [pdp-php, pdp-nginx]

    steps:
      - name: 🔐 GH CLI | Auth
        run: gh auth setup-git

      - name: 🧹 Registry | Cleanup ${{ matrix.package }}
        env:
          OWNER: ${{ github.repository_owner }}
          PACKAGE: ${{ matrix.package }}
        run: |
          echo "🧩 Package: $PACKAGE"

          gh api --paginate "/orgs/$OWNER/packages/container/$PACKAGE/versions?per_page=100" \
          | jq -r 'sort_by(.created_at) | reverse | .[].id' \
          | tail -n +11 \
          | xargs -r -I{} gh api --method DELETE "/orgs/$OWNER/packages/container/$PACKAGE/versions/{}"

          echo "✅ Cleanup finished for $PACKAGE"
